<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Todo List</title>
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar__workspace">
        <img class="sidebar__workspace-icon" src="icon.svg" alt="" />
        <span class="sidebar__workspace-name">My Workspace</span>
      </div>

      <div class="sidebar__search">
        <span class="sidebar__search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search" autocomplete="off" />
      </div>

      <nav class="sidebar__nav">
        <button class="sidebar__item active" data-filter="all">
          <span class="sidebar__item-icon">☰</span>
          <span class="sidebar__item-label">All Todos</span>
          <span class="sidebar__item-count" id="count-all"></span>
        </button>
        <button class="sidebar__item" data-filter="active">
          <span class="sidebar__item-icon">◯</span>
          <span class="sidebar__item-label">Active</span>
          <span class="sidebar__item-count" id="count-active"></span>
        </button>
        <button class="sidebar__item" data-filter="completed">
          <span class="sidebar__item-icon">✓</span>
          <span class="sidebar__item-label">Completed</span>
          <span class="sidebar__item-count" id="count-completed"></span>
        </button>
      </nav>

      <div class="sidebar__footer">
        <span>FastAPI + PostgreSQL</span>
        <button id="logout-btn" class="sidebar__logout" type="button">Log out</button>
      </div>
    </aside>

    <main class="page">
      <div class="page__content">
        <img class="page__icon" src="icon.svg" alt="Plan It" />
        <h1 class="page__title">Todo List</h1>
        <div class="page__meta">
          <span id="page-date"></span>
          <span class="page__meta-dot">•</span>
          <span id="page-summary"></span>
        </div>

        <div class="page__actions">
          <button id="refresh-btn" class="btn btn--ghost" type="button">⟳ Refresh</button>
        </div>

        <div class="page__divider"></div>

        <p id="error" class="error" hidden></p>
        <p id="loading" class="loading">Loading todos…</p>

        <div id="todo-list" class="blocks"></div>

        <p id="empty-state" class="empty-state" hidden>No todos match here — try another view or add one above.</p>

        <div class="add-form">
          <div class="add-form__fields">
            <input
              type="text"
              id="title-input"
              class="add-form__input"
              placeholder="Title"
              autocomplete="off"
            />
            <input
              type="text"
              id="new-description-input"
              class="add-form__input"
              placeholder="Description (optional)"
              autocomplete="off"
            />
          </div>
          <button id="add-btn" class="btn btn--primary" type="button">+ Create</button>
        </div>
      </div>
    </main>
  </div>

  <template id="todo-block-template">
    <div class="block">
      <label class="block__checkbox">
        <input type="checkbox" class="block__checkbox-input" />
        <span class="block__checkbox-box"></span>
      </label>

      <div class="block__text">
        <div class="block__view">
          <span class="block__title"></span>
          <span class="block__desc"></span>
        </div>
        <div class="block__edit">
          <input type="text" class="block__edit-title" placeholder="Title" />
          <input type="text" class="block__edit-desc" placeholder="Description (optional)" />
        </div>
      </div>

      <div class="block__actions">
        <button class="btn btn--ghost block__btn-edit" type="button">✎ Edit</button>
        <button class="btn btn--danger block__btn-delete" type="button">🗑 Delete</button>
        <button class="btn btn--primary block__btn-save" type="button">✓ Save</button>
        <button class="btn btn--ghost block__btn-cancel" type="button">Cancel</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
